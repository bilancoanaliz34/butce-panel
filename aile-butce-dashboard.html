<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aile Bütçe Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#12151c;--bg3:#181c26;--bg4:#1e2330;
  --border:#ffffff0f;--border2:#ffffff18;
  --text:#e8eaf0;--text2:#8b909e;--text3:#555a6a;
  --accent:#4f8ef7;--accent2:#7c5af5;--green:#34d399;--red:#f87171;--amber:#fbbf24;--teal:#22d3ee;
  --card-r:14px;
  --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh;overflow-x:hidden}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.logo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:15px;font-weight:600;letter-spacing:-.02em}
.logo-mark span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.nav{padding:12px 0;flex:1;overflow-y:auto}
.nav-section{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--text3);padding:12px 20px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;color:var(--text2);font-size:12px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.month-sel{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 10px}
.month-sel select{background:none;border:none;color:var(--text);font-size:12px;font-family:var(--font);outline:none;cursor:pointer;width:100%}
.month-sel select option{background:#1e2330}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:10px}
.fx-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px}
.fx-val{font-family:var(--mono);color:var(--amber);font-weight:500}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-refresh{background:var(--bg4);border:1px solid var(--amber)33;color:var(--amber);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-refresh:hover{background:var(--amber)18}
.btn-refresh.loading{opacity:.6;pointer-events:none}
.content{flex:1;padding:20px 28px;overflow-y:auto}

/* PASTEL METRIC CARDS */
.metrics{display:grid;gap:12px;margin-bottom:20px}
.metric{border-radius:var(--card-r);padding:16px;position:relative;overflow:hidden;border:1px solid transparent}
.metric.c-blue{background:linear-gradient(135deg,rgba(79,142,247,.13),rgba(79,142,247,.06));border-color:rgba(79,142,247,.2)}
.metric.c-green{background:linear-gradient(135deg,rgba(52,211,153,.13),rgba(52,211,153,.06));border-color:rgba(52,211,153,.2)}
.metric.c-red{background:linear-gradient(135deg,rgba(248,113,113,.13),rgba(248,113,113,.06));border-color:rgba(248,113,113,.2)}
.metric.c-amber{background:linear-gradient(135deg,rgba(251,191,36,.13),rgba(251,191,36,.06));border-color:rgba(251,191,36,.2)}
.metric.c-teal{background:linear-gradient(135deg,rgba(34,211,238,.13),rgba(34,211,238,.06));border-color:rgba(34,211,238,.2)}
.metric.c-purple{background:linear-gradient(135deg,rgba(124,90,245,.13),rgba(124,90,245,.06));border-color:rgba(124,90,245,.2)}
.metric.c-pink{background:linear-gradient(135deg,rgba(244,114,182,.13),rgba(244,114,182,.06));border-color:rgba(244,114,182,.2)}
.m-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.m-value{font-size:19px;font-weight:600;letter-spacing:-.03em;font-family:var(--mono);margin-bottom:3px}
.m-sub{font-size:10px;color:var(--text3)}
.m-change{font-size:10px;margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--text3)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.grid-full{display:grid;grid-template-columns:1fr;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.chart-wrap{position:relative;width:100%}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:0 10px 9px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#ffffff03}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.cc-card{border-radius:14px;padding:18px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s;color:#fff}
.cc-card:hover{transform:translateY(-2px)}
.cc-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.cc-card::before{content:'';position:absolute;bottom:-40px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.cc-number{font-family:var(--mono);font-size:12px;letter-spacing:.15em;opacity:.65;margin:10px 0 14px}
.cc-limit-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:12px}
.cc-limit-fill{height:100%;border-radius:2px;background:rgba(255,255,255,.6)}
.cc-cut-badge{position:absolute;top:12px;right:12px;font-size:9px;background:rgba(255,255,255,.15);padding:3px 7px;border-radius:4px;font-family:var(--mono)}
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.bank-item:last-child{border-bottom:none}
.bank-logo{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.bank-info{flex:1;padding:0 10px}
.bank-name{font-size:12px;font-weight:500}
.bank-type{font-size:10px;color:var(--text3)}
.badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:500;font-family:var(--mono)}
.badge-green{background:#34d39918;color:var(--green)}
.badge-red{background:#f8717118;color:var(--red)}
.badge-amber{background:#fbbf2418;color:var(--amber)}
.badge-blue{background:#4f8ef718;color:var(--accent)}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--text2)}
.fx-badge{font-size:9px;font-family:var(--mono);background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--amber);display:inline-block}
.budget-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.budget-row:last-child{border-bottom:none}
.br-name{font-size:12px;width:90px;flex-shrink:0}
.br-bar-wrap{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.br-bar-planned{position:absolute;top:0;left:0;height:100%;border-radius:5px;background:var(--border2)}
.br-bar-actual{position:absolute;top:0;left:0;height:100%;border-radius:5px}
.br-amounts{font-size:11px;font-family:var(--mono);text-align:right;width:150px;flex-shrink:0}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.member-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:3px;overflow:hidden}
.member-fill{height:100%;border-radius:2px}

/* ALACAK/VERECEK */
.av-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.av-item:last-child{border-bottom:none}
.av-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* YATIRIM */
.inv-type-header{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.inv-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.inv-row:last-child{border-bottom:none}

/* SPIN */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:28px;width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">Bütçe<span>.</span></div>
    <div class="logo-sub">Aile Finans Paneli</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Ana Görünüm</div>
    <div class="nav-item active" onclick="switchPage('ozet',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/></svg>
      Özet
    </div>
    <div class="nav-item" onclick="switchPage('planlanan',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="3" rx="1" fill="currentColor" opacity=".6"/><rect x="1" y="6" width="9" height="2" rx="1" fill="currentColor" opacity=".4"/><rect x="1" y="10" width="11" height="2" rx="1" fill="currentColor" opacity=".4"/><rect x="1" y="14" width="7" height="2" rx="1" fill="currentColor" opacity=".3"/></svg>
      Planlanan
    </div>
    <div class="nav-item" onclick="switchPage('butce',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12L6 8l3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Bütçe & Gerçekleşen
    </div>
    <div class="nav-item" onclick="switchPage('tahmin',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Tahmin & Trend
    </div>
    <div class="nav-section">Hesaplar</div>
    <div class="nav-item" onclick="switchPage('kartlar',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M1 7h14" stroke="currentColor" stroke-width="1.5"/></svg>
      Kredi Kartları
    </div>
    <div class="nav-item" onclick="switchPage('bankalar',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 1l7 4H1l7-4z" fill="currentColor" opacity=".6"/><rect x="2" y="6" width="2" height="6" fill="currentColor" opacity=".5"/><rect x="7" y="6" width="2" height="6" fill="currentColor" opacity=".5"/><rect x="12" y="6" width="2" height="6" fill="currentColor" opacity=".5"/><rect x="1" y="12" width="14" height="2" rx="1" fill="currentColor" opacity=".4"/></svg>
      Banka Hesapları
    </div>
    <div class="nav-item" onclick="switchPage('yatirimlar',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 14l3-5 3 2 3-4 3-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Yatırımlar
    </div>
    <div class="nav-section">Harcamalar</div>
    <div class="nav-item" onclick="switchPage('harcamalar',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M13 4H3a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8.5" r="1.5" fill="currentColor"/></svg>
      Harcamalar
    </div>
    <div class="nav-item" onclick="switchPage('gelirler',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M4 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Gelirler
    </div>
    <div class="nav-item" onclick="switchPage('borclar',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Borç / Alacak
    </div>
    <div class="nav-item" onclick="switchPage('kisiler',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M1 14c0-3 2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="13" cy="5" r="2" stroke="currentColor" stroke-width="1.2" opacity=".5"/></svg>
      Aile Üyeleri
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="month-sel">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="#8b909e" stroke-width="1.2"/><path d="M4 1v2M8 1v2M1 5h10" stroke="#8b909e" stroke-width="1.2" stroke-linecap="round"/></svg>
      <select id="monthSel">
        <option value="10">Ekim 2025</option><option value="11">Kasım 2025</option>
        <option value="12">Aralık 2025</option><option value="1">Ocak 2026</option>
        <option value="2">Şubat 2026</option><option value="3" selected>Mart 2026</option>
      </select>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="pageTitle">Genel Özet</div>
      <div style="font-size:11px;color:var(--text3);margin-top:1px" id="pageDesc">Mart 2026</div>
    </div>
    <div class="topbar-right">
      <div class="fx-pill">
        <span style="color:var(--text3);font-size:11px">$1 =</span>
        <span class="fx-val" id="fxDisplay">₺38.42</span>
        <button class="btn-refresh" id="fxRefreshBtn" onclick="refreshFX()">
          <span id="fxIcon">↻</span> Kur Güncelle
        </button>
      </div>
      <button class="btn btn-ghost" onclick="openModal()">+ Harcama Ekle</button>
      <button class="btn btn-ghost" onclick="openCloudSettings()" style="gap:4px;border-color:var(--teal)33;color:var(--teal)" title="Jsonbin.io bulut senkronizasyon ayarları">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 11a3 3 0 01-.5-5.95A4.5 4.5 0 0112.5 7H13a2 2 0 010 4H4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        <span id="cloudBtnLabel">Bulut</span>
      </button>
      <button class="btn btn-ghost" onclick="importData()" style="gap:4px" title="JSON dosyası yükle">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Yükle
      </button>
      <button class="btn btn-primary" onclick="exportData()" style="gap:4px">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 11V2M4 5l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        İndir
      </button>
      <div id="saveIndicator" style="font-size:10px;color:var(--text3);font-family:var(--mono);min-width:90px;text-align:right;white-space:nowrap"></div>
      <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(this)">
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="width:500px">
    <div class="modal-title">Yeni Harcama Ekle</div>
    <div class="form-group"><label class="form-label">Tarih</label><input class="form-input" type="date" id="f-date" value="2026-03-28"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tutar (₺)</label>
        <input class="form-input" type="number" id="f-try-in" placeholder="0,00" oninput="calcUSD()">
      </div>
      <div class="form-group"><label class="form-label">Kur (₺/$)</label>
        <input class="form-input" type="number" id="f-rate" placeholder="38.42" oninput="calcUSD()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">USD Karşılığı (otomatik)</label>
      <input class="form-input" type="text" id="f-usd-disp" readonly style="color:var(--teal)">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Taksit Sayısı</label>
        <select class="form-input" id="f-inst" onchange="calcUSD();updatePeriodSelector()">
          <option value="1">Tek çekim</option>
          <option value="2">2 taksit</option>
          <option value="3">3 taksit</option>
          <option value="6">6 taksit</option>
          <option value="9">9 taksit</option>
          <option value="12">12 taksit</option>
          <option value="18">18 taksit</option>
          <option value="24">24 taksit</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Taksit Tutarı</label>
        <input class="form-input" type="text" id="f-inst-amt" readonly style="color:var(--amber)">
      </div>
    </div>
    <div id="f-inst-info" style="display:none;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--teal)"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Kategori</label>

function renderCCDetail(idx){
  const cc=CREDIT_CARDS[idx];
  if(!cc) return '';
  const today=new Date();
  const cut=new Date(today.getFullYear(),today.getMonth(),cc.cutDay);
  if(cut<today)cut.setMonth(cut.getMonth()+1);
  const days=Math.ceil((cut-today)/864e5);

  // Sadece allTransactions'dan al — cc.txns'e bakma
  const cardTxns=allTransactions.filter(t=>getCardByLabel(t.card)===cc);

  // spentTRY'yi gerçek veriden hesapla
  const realSpent=cardTxns.reduce((s,t)=>s+(t.try||0),0);
  cc.spentTRY=realSpent; // senkronize et
  const remaining=cc.limitTRY-realSpent;
  const pct=Math.round(realSpent/cc.limitTRY*100);

  // Dönem dönem grupla
  const byPeriod={};
  cardTxns.forEach(t=>{
    const key=t.billingPeriod||'Dönem Belirtilmemiş';
    if(!byPeriod[key]) byPeriod[key]=[];
    byPeriod[key].push(t);
  });

  const periodOrder=Object.keys(byPeriod).sort((a,b)=>{
    const parseP=s=>{const p=s.split(' ');return(parseInt(p[1])||0)*12+(MN_TR.indexOf(p[0]));};
    return parseP(a)-parseP(b);
  });

  const periodHTML=periodOrder.length===0
    ? `<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">Bu karta ait işlem yok</td></tr>`
    : periodOrder.map(period=>{
        const txns=byPeriod[period];
        const totalTRY=txns.reduce((s,t)=>s+(t.try||0),0);
        return`
          <tr style="background:var(--bg3)">
            <td colspan="5" style="font-size:11px;font-weight:600;color:var(--accent);padding:8px 12px;letter-spacing:.04em">
              📅 ${period} Ekstresi
            </td>
            <td style="font-size:11px;font-family:var(--mono);color:var(--amber);padding:8px 12px;text-align:right">${fmtTRY(totalTRY)}</td>
            <td style="padding:8px 12px;text-align:right">
              <button onclick="editBillingPeriod(${idx},'${period}')" style="background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-size:10px;padding:2px 6px;cursor:pointer;font-family:var(--font)">✎ Dönem</button>
            </td>
          </tr>
          ${txns.map((t,ti)=>{
            const tIdx=allTransactions.indexOf(t);
            return`<tr>
              <td style="color:var(--text3);font-family:var(--mono);padding-left:20px">${t.date}</td>
              <td style="font-weight:500">${t.desc}${t.installment?` <span style="font-size:9px;background:#22d3ee18;color:var(--teal);padding:1px 5px;border-radius:3px">${t.installment.current}/${t.installment.total}</span>`:''}</td>
              <td><span class="tag" style="background:${CAT_COLORS[t.cat]||'#888'}18;color:${CAT_COLORS[t.cat]||'#888'}">${t.cat}</span></td>
              <td><div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:22px;height:22px;font-size:9px;background:${mColor(t.member)}22;color:${mColor(t.member)}">${mInit(t.member)}</div>${t.member}</div></td>
              <td style="font-family:var(--mono)">${fmtUSD(t.usd,2)}</td>
              <td style="font-family:var(--mono);font-weight:500">${fmtTRY(t.try||0)}</td>
              <td style="text-align:right">
                <button onclick="deleteTransaction(${tIdx});const el=$('ccDetail');if(el)el.innerHTML=renderCCDetail(${idx})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 6px;border-radius:4px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'" title="Sil">✕</button>
              </td>
            </tr>`;
          }).join('')}`;
      }).join('');

  return`<div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">${cc.bank} ${cc.label} — Ekstre Görünümü</div>
        <div class="card-sub">Kesim: her ayın <strong>${cc.cutDay}.</strong> · ${days} gün kaldı · Kalan: ${fmtTRY(remaining)} (${fmtUSD(remaining/FX,0)})</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${CREDIT_CARDS.map((c,i)=>`<button class="btn btn-ghost btn-sm" onclick="selectCard(${i})" style="${i===idx?'border-color:var(--accent);color:var(--accent)':''}">${c.label}</button>`).join('')}
        <button class="btn btn-ghost btn-sm" onclick="openCardSettingsModal(${idx})" style="color:var(--amber);border-color:var(--amber)33">⚙</button>
      </div>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:12px">
      <div style="background:var(--bg3);border-radius:8px;padding:8px 14px;font-size:11px">
        <div style="color:var(--text3);margin-bottom:2px">Toplam Harcama</div>
        <div style="font-family:var(--mono);font-weight:600;font-size:15px;color:var(--red)">${fmtTRY(realSpent)}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px 14px;font-size:11px">
        <div style="color:var(--text3);margin-bottom:2px">Limit Kullanım</div>
        <div style="font-family:var(--mono);font-weight:600;font-size:15px">%${pct}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px 14px;font-size:11px">
        <div style="color:var(--text3);margin-bottom:2px">${cardTxns.length} İşlem</div>
        <div style="font-family:var(--mono);font-weight:600;font-size:15px;color:var(--text2)">${Object.keys(byPeriod).length} Dönem</div>
      </div>
    </div>
    <table class="data-table">
      <thead><tr><th>Tarih</th><th>Açıklama</th><th>Kategori</th><th>Kişi</th><th>USD</th><th>₺ Tutarı</th><th style="width:40px"></th></tr></thead>
      <tbody>${periodHTML}</tbody>
    </table>
  </div>`;
}

// Bir ekstre döneminin tüm işlemlerini başka döneme taşı
window.editBillingPeriod=function(ccIdx, oldPeriod){
  const cc=CREDIT_CARDS[ccIdx];
  // Build next 12 period options
  const opts=[];
  const now=new Date();
  for(let i=-2;i<12;i++){
    let mo=now.getMonth()+i, yr=now.getFullYear()+Math.floor(mo/12); mo=((mo%12)+12)%12;
    opts.push(`${MN_TR[mo]} ${yr}`);
  }
  const html=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Ekstre Dönemini Değiştir</div>
    <div style="background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text3)">
      <strong style="color:var(--text)">${oldPeriod}</strong> dönemindeki tüm işlemler yeni döneme taşınacak.
    </div>
    <div class="form-group">
      <label class="form-label">Yeni Dönem</label>
      <select class="form-input" id="ep-new">
        ${opts.map(o=>`<option ${o===oldPeriod?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDynModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveBillingPeriodEdit(${ccIdx},'${oldPeriod}')">Taşı</button>
    </div>
  </div>`;
  showDynModal(html);
};

window.saveBillingPeriodEdit=function(ccIdx, oldPeriod){
  const newPeriod=$('ep-new').value;
  const cc=CREDIT_CARDS[ccIdx];
  cc.txns.forEach(t=>{ if(t.billingPeriod===oldPeriod) t.billingPeriod=newPeriod; });
  allTransactions.forEach(t=>{ if(t.billingPeriod===oldPeriod&&t.card===cc.label) t.billingPeriod=newPeriod; });
  closeDynModal();
  const el=$('ccDetail'); if(el) el.innerHTML=renderCCDetail(ccIdx);
};

window.saveCardSettings=function(idx){
  const realIdx=(idx!=null&&idx!=='null'&&idx!==undefined)?parseInt(idx):null;
  const last4=$('cc-last4').value.padStart(4,'0').slice(-4);
  const colorIdx=parseInt($('cc-color-sel').value)||0;
  const entry={
    bank:$('cc-bank').value||'Banka',
    label:$('cc-label').value||'Kart',
    owner:$('cc-owner').value,
    number:`•••• •••• •••• ${last4}`,
    limitTRY:parseFloat($('cc-limit').value)||0,
    spentTRY:parseFloat($('cc-spent').value)||0,
    cutDay:parseInt($('cc-cutday').value)||15,
    payOffset:parseInt($('cc-payoffset').value)||10,
    color:CARD_COLORS_LIST[colorIdx]||CARD_COLORS_LIST[0],
    txns: realIdx!=null&&CREDIT_CARDS[realIdx]?CREDIT_CARDS[realIdx].txns:[],
  };
  if(realIdx!=null)CREDIT_CARDS[realIdx]=entry;else CREDIT_CARDS.push(entry);
  closeDynModal();switchPage('kartlar',null);document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('kartlar'))n.classList.add('active');});
};
window.deleteCard=function(idx){const i=parseInt(idx);CREDIT_CARDS.splice(i,1);closeDynModal();switchPage('kartlar',null);document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('kartlar'))n.classList.add('active');});};

window.saveMember=function(idx){
  const name=$('mb-name').value.trim();
  const initials=$('mb-init').value.trim().toUpperCase();
  const color=$('mb-color-val').value;
  if(!name){alert('Ad boş olamaz.');return;}
  const id=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const entry={id, name, initials:initials||(name.slice(0,2).toUpperCase()), color};
  if(idx!=null) MEMBERS[idx]={...MEMBERS[idx],...entry};
  else MEMBERS.push(entry);
  // Update modal dropdowns everywhere
  refreshMemberDropdowns();
  closeDynModal();
  switchPage('kisiler',null);
  document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('kisiler'))n.classList.add('active');});
};

window.deleteMember=function(idx){
  const m=MEMBERS[idx];
  const txnCount=allTransactions.filter(t=>t.member===m.name).length;
  const msg=txnCount>0
    ?`${m.name} silinsin mi? Bu kişiye ait ${txnCount} harcama kaydı etkilenmez ama üye listesinden kaldırılır.`
    :`${m.name} silinsin mi?`;
  if(!confirm(msg)) return;
  MEMBERS.splice(idx,1);
  refreshMemberDropdowns();
  closeDynModal();
  switchPage('kisiler',null);
  document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('kisiler'))n.classList.add('active');});
};

function refreshMemberDropdowns(){
  // Update the harcama modal member select if it's open
  const sel=$('f-member');
  if(sel){
    const cur=sel.value;
    sel.innerHTML=MEMBERS.map(m=>`<option ${m.name===cur?'selected':''}>${m.name}</option>`).join('');
  }
  const iSel=$('inc-member');
  if(iSel) iSel.innerHTML=MEMBERS.map(m=>`<option>${m.name}</option>`).join('');
}

function pagePlanlanan(){
  // Gerçekleşen toplamları hesapla
  const actInc={};
  INCOME_RECORDS.forEach(r=>{
    const c=r.cat||'Diğer Gelir';
    actInc[c]=(actInc[c]||0)+(r.try||Math.round((r.usd||0)*(r.rate||FX)));
  });
  const actExp={};
  allTransactions.forEach(t=>{
    const c=t.cat||'Diğer';
    actExp[c]=(actExp[c]||0)+(t.try||Math.round((t.usd||0)*(t.rate||FX)));
  });

  // Aylık plan toplamları
  const planIncTotal=PLAN_INC_CATS.reduce((s,c)=>s+c.monthly.reduce((a,b)=>a+b,0),0);
  const planExpTotal=PLAN_EXP_CATS.reduce((s,c)=>s+c.monthly.reduce((a,b)=>a+b,0),0);
  const actIncTotal=Object.values(actInc).reduce((a,b)=>a+b,0);
  const actExpTotal=Object.values(actExp).reduce((a,b)=>a+b,0);

  const catRow=(cat,planArr,actTRY,color)=>{
    const planTotal=planArr.reduce((a,b)=>a+b,0);
    const diff=actTRY-planTotal;
    const pct=planTotal>0?Math.round(actTRY/planTotal*100):0;
    const over=diff>0;
    const barColor=over?'var(--red)':actTRY>0?'var(--green)':'var(--bg3)';
    const barW=planTotal>0?Math.min(100,Math.round(actTRY/planTotal*100)):0;
    return`<tr>
      <td style="font-weight:500">${cat}</td>
      <td style="font-family:var(--mono);font-weight:600;color:${color}">${fmtTRY(planTotal)}</td>
      <td style="font-family:var(--mono)">${fmtTRY(actTRY||0)}</td>
      <td>
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:60px">
          <div style="height:100%;width:${barW}%;background:${barColor};border-radius:3px"></div>
        </div>
      </td>
      <td style="font-family:var(--mono);color:${over?'var(--red)':actTRY>0?'var(--green)':'var(--text3)'}">
        ${actTRY>0?(over?'▲ +':'▼ ')+fmtTRY(Math.abs(diff)):'—'}
      </td>
      <td><span class="badge ${pct>=100?'badge-red':pct>0?'badge-green':'badge-amber'}" style="font-family:var(--mono)">${pct}%</span></td>
      <td><button onclick="openCatPlanModal('${cat}')" style="background:none;border:1px solid var(--border2);border-radius:5px;cursor:pointer;color:var(--text3);font-size:10px;padding:2px 8px;font-family:var(--font)">✎ Düzenle</button></td>
    </tr>`;
  };

  return`
  <div class="metrics" style="grid-template-columns:repeat(4,1fr)">
    <div class="metric c-green"><div class="m-label">Planlanan Gelir (Yıllık)</div><div class="m-value">${fmtTRY(planIncTotal)}</div><div class="m-sub">${fmtUSD(planIncTotal/FX,0)}</div></div>
    <div class="metric c-blue"><div class="m-label">Gerçekleşen Gelir</div><div class="m-value">${fmtTRY(actIncTotal)}</div><div class="m-sub">${fmtUSD(actIncTotal/FX,0)}</div></div>
    <div class="metric c-red"><div class="m-label">Planlanan Gider (Yıllık)</div><div class="m-value">${fmtTRY(planExpTotal)}</div><div class="m-sub">${fmtUSD(planExpTotal/FX,0)}</div></div>
    <div class="metric c-amber"><div class="m-label">Gerçekleşen Gider</div><div class="m-value">${fmtTRY(actExpTotal)}</div><div class="m-sub">${fmtUSD(actExpTotal/FX,0)}</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div><div class="card-title" style="color:var(--green)">Gelir Kategorileri</div><div class="card-sub">Planlanan vs Gerçekleşen · Her kategoriye tıklayarak aylık plan girin</div></div>
        <button class="btn btn-primary" onclick="openBulkPlanModal('gelir')">+ Toplu Gir</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Kategori</th><th>Planlanan</th><th>Gerçekleşen</th><th>İlerleme</th><th>Fark</th><th>%</th><th style="width:80px"></th></tr></thead>
        <tbody>
          ${PLAN_INC_CATS.map(c=>catRow(c.cat,c.monthly,actInc[c.cat]||0,'var(--green)')).join('')}
        </tbody>
        <tfoot><tr style="border-top:2px solid var(--border2)">
          <td style="font-weight:600">Toplam</td>
          <td style="font-family:var(--mono);font-weight:600;color:var(--green)">${fmtTRY(planIncTotal)}</td>
          <td style="font-family:var(--mono);font-weight:600">${fmtTRY(actIncTotal)}</td>
          <td colspan="4"></td>
        </tr></tfoot>
      </table>
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title" style="color:var(--red)">Gider Kategorileri</div><div class="card-sub">Planlanan vs Gerçekleşen</div></div>
        <button class="btn btn-ghost" onclick="openBulkPlanModal('gider')">+ Toplu Gir</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Kategori</th><th>Planlanan</th><th>Gerçekleşen</th><th>İlerleme</th><th>Fark</th><th>%</th><th style="width:80px"></th></tr></thead>
        <tbody>
          ${PLAN_EXP_CATS.map(c=>catRow(c.cat,c.monthly,actExp[c.cat]||0,'var(--red)')).join('')}
        </tbody>
        <tfoot><tr style="border-top:2px solid var(--border2)">
          <td style="font-weight:600">Toplam</td>
          <td style="font-family:var(--mono);font-weight:600;color:var(--red)">${fmtTRY(planExpTotal)}</td>
          <td style="font-family:var(--mono);font-weight:600">${fmtTRY(actExpTotal)}</td>
          <td colspan="4"></td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;
}

window.openCatPlanModal=function(cat){
  const isInc=INC_CATS.includes(cat);
  const arr=isInc?PLAN_INC_CATS:PLAN_EXP_CATS;
  const entry=arr.find(c=>c.cat===cat);
  if(!entry) return;
  const color=isInc?'var(--green)':'var(--red)';
  const rows=MONTHS_LABELS.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;font-weight:500;min-width:36px;color:var(--accent)">${m}</span>
      <input class="form-input" type="number" id="cp-${i}" value="${entry.monthly[i]||''}" placeholder="0" style="flex:1;padding:6px 10px;font-size:12px">
      <span style="font-size:10px;color:var(--text3);min-width:60px;text-align:right" id="cp-usd-${i}">${entry.monthly[i]>0?fmtUSD(entry.monthly[i]/FX,0):''}</span>
    </div>`).join('');

  const html=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" style="color:${color}">${cat} — Aylık Plan (₺)</div>
    <div style="background:var(--bg3);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:var(--text3)">
      Her ay için planlanan tutarı girin. Boş bıraktığınız aylar 0 olarak alınır.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="form-input" type="number" id="cp-fill-val" placeholder="Tüm aylara aynı değeri gir..." style="flex:1;font-size:12px">

    </div>
    ${rows}

      <button class="btn btn-ghost" onclick="closeDynModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveCatPlan('${cat}')">Kaydet</button>
    </div>
  </div>`;
  showDynModal(html);
};

window.fillAllMonths=function(){
  const val=parseFloat(document.getElementById('cp-fill-val')?.value)||0;
  MONTHS_LABELS.forEach((_,i)=>{
    const el=document.getElementById(`cp-${i}`);
    if(el){el.value=val||'';const usd=document.getElementById(`cp-usd-${i}`);if(usd)usd.textContent=val>0?fmtUSD(val/FX,0):'';}
  });
};

window.saveCatPlan=function(cat){
  const isInc=INC_CATS.includes(cat);
  const arr=isInc?PLAN_INC_CATS:PLAN_EXP_CATS;
  const entry=arr.find(c=>c.cat===cat);
  if(!entry) return;
  MONTHS_LABELS.forEach((_,i)=>{
    entry.monthly[i]=parseFloat(document.getElementById(`cp-${i}`)?.value)||0;

  PLAN_EXP_TRY.forEach((_,i)=>{ PLAN_EXP_TRY[i]=PLAN_EXP_CATS.reduce((s,c)=>s+c.monthly[i],0); });

      {label:'Giriş',data:INCOME_USD.map(v=>Math.round(v*FX/1000)),backgroundColor:'#34d39966',borderRadius:4,barPercentage:.6},

  if(page==='yatirimlar'){

    const types=['kripto','hisse','altin','fon','bes'];

    const avgByType=types.map(type=>{

      });

    new Chart($('invMonthly'),{type:'line',data:{labels:MONTHS_LABELS,datasets:types.map((type,ti)=>({
      label:INV_LABELS[type],data:avgByType[ti],borderColor:INV_COLORS[type],

      pointBackgroundColor:INV_COLORS[type],borderWidth:2,
    }))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:G},border:{display:false},ticks:{color:'#555a6a'}},y:{grid:{color:G},border:{display:false},ticks:{color:'#555a6a',callback:v=>v+'%'}}}}});
  }
}

// ─── BORÇ/ALACAK PAGE ────────────────────────────────────────────────────────
function pageBorclar(){
  // Her kartın gelecek 3 ekstresi — taksit dağılımı ile
  const ccDebts = [];
  CREDIT_CARDS.forEach(cc=>{
    if(!cc.spentTRY && (!cc.txns||cc.txns.length===0)) return;
    const today=new Date();
    const byPeriod={};
    (cc.txns||[]).forEach(t=>{
      const key=t.billingPeriod||'Bilinmeyen';
      if(!byPeriod[key]) byPeriod[key]=0;
      byPeriod[key]+=t.try||Math.round(t.usd*(t.rate||FX));
    });
    if(Object.keys(byPeriod).length===0){
      const cut=new Date(today.getFullYear(),today.getMonth(),cc.cutDay);
      if(cut<today)cut.setMonth(cut.getMonth()+1);
      const dateLabel=`${cut.getDate()} ${MN_TR[cut.getMonth()]}`;
      const eid=`cc_${cc.label}_0`;
      if(!PAID_EKSTRES.has(eid))
        ccDebts.push({id:eid,type:'verecek',person:`${cc.bank} ${cc.label}`,
          desc:'Kredi kartı ekstresi',usd:+(cc.spentTRY/FX).toFixed(2),
          rate:FX,try:cc.spentTRY,date:dateLabel,status:'bekliyor',isAuto:true,ccLabel:cc.label});
      return;
    }
    Object.entries(byPeriod).forEach(([period,totalTRY])=>{
      const eid=`cc_${cc.label}_${period.replace(' ','_')}`;
      if(PAID_EKSTRES.has(eid)) return; // ödendi — listede gösterme
      const parts=period.split(' ');
      const mo=MN_TR.indexOf(parts[0]);
      const yr=parseInt(parts[1])||today.getFullYear();
      const cutDate=new Date(yr,mo<0?today.getMonth():mo,cc.cutDay);
      const dateLabel=`${cc.cutDay} ${MN_TR[cutDate.getMonth()]}`;
      ccDebts.push({id:eid,type:'verecek',person:`${cc.bank} ${cc.label}`,
        desc:`${period} ekstresi`,usd:+(totalTRY/FX).toFixed(2),
        rate:FX,try:totalTRY,date:dateLabel,status:'bekliyor',isAuto:true,
        ccLabel:cc.label,_sortDate:cutDate});
    });
  });

  function parseDateLabel(label){
    if(!label) return new Date(9999,0,1);
    const parts=label.split(' ');
    const mo=MN_TR.indexOf(parts[1]);
    return new Date(2026,mo<0?0:mo,parseInt(parts[0])||1);
  }

  const allEntries=[...ALACAK_VERECEK,...ccDebts];
  const alacaklar=allEntries.filter(a=>a.type==='alacak').sort((a,b)=>parseDateLabel(a.date)-parseDateLabel(b.date));
  const verecekler=allEntries.filter(a=>a.type==='verecek').sort((a,b)=>parseDateLabel(a.date)-parseDateLabel(b.date));
  const totalAlacakTRY=alacaklar.reduce((s,a)=>s+(a.try||Math.round(a.usd*(a.rate||FX))),0);
  const totalVerecekTRY=verecekler.reduce((s,a)=>s+(a.try||Math.round(a.usd*(a.rate||FX))),0);
  const totalAlacak=+(totalAlacakTRY/FX).toFixed(0);
  const totalVerecek=+(totalVerecekTRY/FX).toFixed(0);

  const renderRow=(a)=>{
    const tryAmt=a.try||Math.round(a.usd*(a.rate||FX));
    const usdAmt=+(tryAmt/FX).toFixed(2);
    const isGreen=a.type==='alacak';
    const statusMap={'ödendi':'badge-green','bekliyor':'badge-amber','gecikti':'badge-red','kısmi':'badge-blue'};
    const statusLabel={'ödendi':'Ödendi','bekliyor':'Bekliyor','gecikti':'Gecikti','kısmi':'Kısmi'};
    return`<tr style="${a.isAuto?'background:rgba(248,113,113,.04)':''}">
      <td style="color:var(--text3);font-family:var(--mono)">${a.date}</td>
      <td style="font-weight:500">${a.person}${a.isAuto?` <span style="font-size:9px;background:rgba(251,191,36,.15);color:var(--amber);padding:1px 5px;border-radius:3px">otomatik</span>`:''}</td>
      <td style="color:var(--text3);font-size:11px">${a.desc}</td>
      <td style="font-family:var(--mono);font-weight:600;color:${isGreen?'var(--green)':'var(--red)'}">${isGreen?'+':'-'}${fmtTRY(tryAmt)}</td>
      <td style="font-size:10px;color:var(--text3)">${isGreen?'+':'-'}${fmtUSD(usdAmt,2)}<br><span class="fx-badge" style="font-size:9px">${'\u20ba'}${(+(a.rate||FX)).toFixed(2)}</span></td>
      <td><span class="badge ${statusMap[a.status]||'badge-amber'}" ${a.isAuto?'':(`style="cursor:pointer" onclick="toggleAVStatus(${a.id})"`)}>
        ${statusLabel[a.status]||'Bekliyor'}</span></td>
      <td style="white-space:nowrap">
        ${a.isAuto
          ?`<button onclick="markEkstreOdendi('${a.id}')" style="background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);border-radius:6px;cursor:pointer;color:var(--green);font-size:11px;padding:4px 10px;font-family:var(--font);transition:all .15s;white-space:nowrap" onmouseover="this.style.background='rgba(52,211,153,.25)'" onmouseout="this.style.background='rgba(52,211,153,.12)'">✓ Ödendi</button>`
          :`<button onclick="openAVModal('${a.type}',${a.id})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 6px;border-radius:4px" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'" title="Düzenle">✎</button>
             <button onclick="deleteAV(${a.id})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 6px;border-radius:4px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'" title="Sil">✕</button>`}
      </td>
    </tr>`;
  };

  return`
  <div class="metrics" style="grid-template-columns:repeat(3,1fr)">
    <div class="metric c-green"><div class="m-label">Toplam Alacak</div><div class="m-value" style="color:var(--green)">${fmtTRY(totalAlacakTRY)}</div><div class="m-sub">${fmtUSD(totalAlacak,0)} \u00b7 ${alacaklar.length} kayıt</div></div>
    <div class="metric c-red"><div class="m-label">Toplam Verecek</div><div class="m-value" style="color:var(--red)">${fmtTRY(totalVerecekTRY)}</div><div class="m-sub">${fmtUSD(totalVerecek,0)} \u00b7 ${ccDebts.length} kart otomatik</div></div>
    <div class="metric c-${totalAlacakTRY>=totalVerecekTRY?'green':'red'}"><div class="m-label">Net Durum</div>
      <div class="m-value" style="color:${totalAlacakTRY>=totalVerecekTRY?'var(--green)':'var(--red)'}">
        ${totalAlacakTRY>=totalVerecekTRY?'+':'-'}${fmtTRY(Math.abs(totalAlacakTRY-totalVerecekTRY))}</div>
      <div class="m-sub">Kur: \u20ba${FX}</div></div>
  </div>
  <div style="background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);margin-bottom:14px">
    <span style="color:var(--amber)">\u24d8</span> Tüm tutarlar <strong>\u20ba TL</strong> bazlıdır. Kredi kartı borçları güncel kur (\u20ba${FX}) ile hesaplanır.
    <button onclick="switchPage('kartlar',null);document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('kartlar'))n.classList.add('active');})" style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:var(--font);font-size:11px;padding:0;margin-left:4px">Kredi Kartları \u2192</button>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div><div class="card-title" style="color:var(--green)">Alacaklar</div><div class="card-sub">${alacaklar.length} kayıt \u00b7 tarih sıralı</div></div>
        <button class="btn btn-primary" onclick="openAVModal('alacak')">+ Alacak Ekle</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Son Tarih</th><th>Kişi</th><th>Açıklama</th><th>\u20ba Tutar</th><th>$ / Kur</th><th>Durum</th><th style="width:80px"></th></tr></thead>
        <tbody>${alacaklar.map(a=>renderRow(a)).join('')}${alacaklar.length===0?'<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">Alacak kaydı yok</td></tr>':''}</tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title" style="color:var(--red)">Verecekler</div><div class="card-sub">${verecekler.length} kayıt \u00b7 tarih sıralı</div></div>
        <button class="btn btn-ghost" onclick="openAVModal('verecek')">+ Verecek Ekle</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Son Tarih</th><th>Kişi</th><th>Açıklama</th><th>\u20ba Tutar</th><th>$ / Kur</th><th>Durum</th><th style="width:80px"></th></tr></thead>
        <tbody>${verecekler.map(a=>renderRow(a)).join('')}${verecekler.length===0?'<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">Verecek kaydı yok</td></tr>':''}</tbody>
      </table>
    </div>
  </div>`;
}
window.deleteAV=function(id){const i=ALACAK_VERECEK.findIndex(a=>a.id===id);if(i>-1)ALACAK_VERECEK.splice(i,1);switchPage('borclar',null);document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('borclar'))n.classList.add('active');});};

// ─── EKSTRA DÖNEM HESAPLAMALARI ───────────────────────────────────────────────
const MN_TR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

function getBillingPeriods(cc, fromDate, count=6){
  // Returns array of {label, year, month, cutDay} for next N billing periods
  const periods=[];
  const base = fromDate ? new Date(fromDate) : new Date();
  let yr=base.getFullYear(), mo=base.getMonth();
  // If already past cut day this month, first period is next month
  if(base.getDate()>=cc.cutDay){ mo++; if(mo>11){mo=0;yr++;} }
  for(let i=0;i<count;i++){
    let m=mo+i, y=yr+Math.floor(m/12); m=m%12;
    periods.push({label:`${MN_TR[m]} ${y} (${cc.cutDay}. kesim)`, year:y, month:m, cutDay:cc.cutDay});
  }
  return periods;
}

window.updatePeriodSelector=function(){
  const method=$('f-method')?.value;
  const cc=getCardByLabel(method);
  const wrap=$('f-period-wrap');
  const sel=$('f-period');
  if(!wrap||!sel) return;
  if(!cc){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  const dateRaw=$('f-date').value;
  const periods=getBillingPeriods(cc, dateRaw);
  sel.innerHTML=periods.map((p,i)=>`<option value="${i}">${i===0?'Bu dönem — ':''}${p.label}</option>`).join('');
  updateInstallmentPreview();
};

window.updateInstallmentPreview=function(){
  const method=$('f-method')?.value;
  const cc=getCardByLabel(method);
  const prev=$('f-period-preview');
  if(!prev||!cc) return;
  const inst=parseInt($('f-inst')?.value)||1;
  const tryVal=parseFloat($('f-try-in')?.value)||0;
  const rate=parseFloat($('f-rate')?.value)||FX;
  const usd=rate>0?+(tryVal/rate).toFixed(2):0;
  const dateRaw=$('f-date')?.value;
  if(!tryVal){prev.innerHTML='';return;}

  const selIdx=parseInt($('f-period')?.value)||0;
  const startPeriods=getBillingPeriods(cc,dateRaw,24);
  const firstPeriod=startPeriods[selIdx];
  if(!firstPeriod){prev.innerHTML='';return;}

  if(inst===1){
    prev.innerHTML=`<strong>${firstPeriod.label}</strong> ekstresine yansır → ${fmtTRY(tryVal)}`;
  } else {
    const perTRY=Math.round(tryVal/inst);
    const perUSD=+(usd/inst).toFixed(2);
    let rows=[];
    for(let i=0;i<Math.min(inst,4);i++){
      let mo=firstPeriod.month+i,yr=firstPeriod.year+Math.floor(mo/12);mo=mo%12;
      rows.push(`${MN_TR[mo]} ${yr} → ${fmtTRY(perTRY)} ≈ ${fmtUSD(perUSD,2)}`);
    }
    if(inst>4) rows.push(`... ve ${inst-4} dönem daha`);
    prev.innerHTML=rows.join('<br>');
  }
};

window.openModal=()=>{
  // Dinamik dropdownları doldur
  const mem=$('f-member');
  if(mem) mem.innerHTML=MEMBERS.map(m=>`<option>${m.name}</option>`).join('');
  const meth=$('f-method');
  if(meth) meth.innerHTML=`<option value="Nakit">Nakit</option>${CREDIT_CARDS.map(cc=>`<option value="${cc.label}">${cc.bank} ${cc.label}</option>`).join('')}`;
  // Kuru ayarla
  const rateEl=$('f-rate');
  if(rateEl) rateEl.value=FX;
  // Tarihi bugüne ayarla
  const dateEl=$('f-date');
  if(dateEl) dateEl.value=new Date().toISOString().slice(0,10);
  // Sıfırla
  const fields=['f-try-in','f-usd-disp','f-inst-amt','f-desc','f-brand','f-qty'];
  fields.forEach(id=>{const el=$(id);if(el)el.value='';});
  const instEl=$('f-inst');if(instEl)instEl.value='1';
  const instInfo=$('f-inst-info');if(instInfo)instInfo.style.display='none';
  updateCardInfo();
  updatePeriodSelector();
  $('modal').classList.add('open');
};
window.closeModal=()=>$('modal').classList.remove('open');

function getCardByLabel(label){
  return CREDIT_CARDS.find(c=>c.label===label||c.bank+' '+c.label===label||label.includes(c.label));
}

window.updateCardInfo=function(){
  const method=$('f-method')?.value;
  const cc=getCardByLabel(method);
  const info=$('f-card-info');
  if(!info) return;
  if(cc){
    const avail=cc.limitTRY-cc.spentTRY;
    info.style.display='block';
    info.innerHTML=`<strong>${cc.bank} ${cc.label}</strong> — Kalan: <strong>${fmtTRY(avail)}</strong> · Kesim: her ayın <strong>${cc.cutDay}.</strong> günü`;
  } else {
    info.style.display='none';
  }
  calcUSD();
};

// Ana hesaplama: TL gir → kur gir → USD otomatik
window.calcUSD=function(){
  const tryVal=parseFloat($('f-try-in')?.value)||0;
  const rate=parseFloat($('f-rate')?.value)||FX;
  const inst=parseInt($('f-inst')?.value)||1;
  const usd=rate>0?+(tryVal/rate).toFixed(2):0;

  const dispEl=$('f-usd-disp');
  if(dispEl) dispEl.value=tryVal>0?fmtUSD(usd,2):'—';

  const amtEl=$('f-inst-amt');
  const infoEl=$('f-inst-info');
  if(tryVal>0&&inst>1){
    const perTRY=Math.round(tryVal/inst);
    const perUSD=+(usd/inst).toFixed(2);
    if(amtEl) amtEl.value=`${fmtTRY(perTRY)} / ay`;
    if(infoEl){
      infoEl.style.display='block';
      infoEl.innerHTML=`${inst} taksit × ${fmtTRY(perTRY)} = ${fmtTRY(tryVal)} · Her taksit ≈ ${fmtUSD(perUSD,2)}`;
    }
  } else {
    if(amtEl) amtEl.value=tryVal>0?'Tek çekim':'—';
    if(infoEl) infoEl.style.display='none';
  }
  updateInstallmentPreview();
};

// Geriye dönük uyumluluk (eski kodlar calcTRY çağırıyorsa)
window.calcTRY=window.calcUSD;

window.addTransaction=function(){
  const tryVal=parseFloat($('f-try-in').value)||0;
  const rate=parseFloat($('f-rate').value)||FX;
  const inst=parseInt($('f-inst').value)||1;
  const method=$('f-method').value;
  const dateRaw=$('f-date').value;

  if(tryVal<=0){alert('Lütfen ₺ tutarı girin.');return;}

  const usd=+(tryVal/rate).toFixed(2);

  const baseT={
    desc:$('f-desc').value||'Harcama',
    cat:$('f-cat').value,
    member:$('f-member').value,
    card:method,
    bank:method,
    rate:rate,
    brand:$('f-brand').value||null,
    qty:parseFloat($('f-qty').value)||null,
    unit:$('f-unit').value||null,
  };

  const cc=getCardByLabel(method);
  const selPeriodIdx=parseInt($('f-period')?.value)||0;
  const periods=cc?getBillingPeriods(cc,dateRaw,24):null;
  const firstPeriod=periods?periods[selPeriodIdx]:null;

  if(inst===1){
    let dateDisplay;
    if(firstPeriod){
      dateDisplay=`${firstPeriod.cutDay} ${MN_TR[firstPeriod.month]}`;
    } else {
      const d=new Date(dateRaw);
      dateDisplay=`${d.getDate()} ${MN_TR[d.getMonth()]}`;
    }
    const t={...baseT,date:dateDisplay,usd,try:Math.round(tryVal),
      installment:null,billingPeriod:firstPeriod?`${MN_TR[firstPeriod.month]} ${firstPeriod.year}`:null};
    allTransactions.unshift(t);
    if(cc){cc.spentTRY+=Math.round(tryVal);}
  } else {
    const perTRY=Math.round(tryVal/inst);
    const perUSD=+(usd/inst).toFixed(2);
    const purchaseDate=new Date(dateRaw);
    const purchaseLabel=`${purchaseDate.getDate()} ${MN_TR[purchaseDate.getMonth()]}`;
    for(let i=0;i<inst;i++){
      let mo=(firstPeriod?firstPeriod.month:purchaseDate.getMonth())+i;
      let yr=(firstPeriod?firstPeriod.year:purchaseDate.getFullYear())+Math.floor(mo/12);
      mo=mo%12;
      const cutDay=cc?cc.cutDay:1;
      const instDateDisplay=`${cutDay} ${MN_TR[mo]}`;
      const billingPeriod=`${MN_TR[mo]} ${yr}`;
      const t={...baseT,date:instDateDisplay,usd:perUSD,try:perTRY,
        installment:{current:i+1,total:inst,originalUSD:usd,purchaseDate:purchaseLabel},billingPeriod};
      allTransactions.push(t);
      if(cc){cc.spentTRY+=perTRY;}
    }
    allTransactions.sort((a,b)=>new Date('2026 '+b.date)-new Date('2026 '+a.date));
  }

  closeModal();
  switchPage(currentPage,null);
  document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes(currentPage))n.classList.add('active');});
};

window.saveInvUpdate=function(){
  const types=['kripto','hisse','altin','fon','bes'];
  types.forEach(type=>{
    const newInv=parseFloat($('inv-inv-'+type).value)||null;
    const newCur=parseFloat($('inv-cur-'+type).value)||null;
    const newRet=parseFloat($('inv-ret-'+type).value);
    const items=INVESTMENTS.items.filter(i=>i.type===type);
    if(newInv!=null){const total=items.reduce((s,i)=>s+i.invested,0);const ratio=total>0?newInv/total:1;items.forEach(i=>i.invested=Math.round(i.invested*ratio));}
    if(newCur!=null){const total=items.reduce((s,i)=>s+i.current,0);const ratio=total>0?newCur/total:1;items.forEach(i=>i.current=Math.round(i.current*ratio));}
    if(!isNaN(newRet)&&newRet!==0)items.forEach(i=>{i.monthly=i.monthly.slice(1);i.monthly.push(newRet);});
  });
  INVESTMENTS.lastUpdated=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'})+', '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  closeDynModal();switchPage('yatirimlar',null);document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes('yatirimlar'))n.classList.add('active');});
};

// ─── DYNAMIC MODAL HELPER ─────────────────────────────────────────────────────
function showDynModal(html){
  let ov=$('dynModalOverlay');
  if(!ov){ov=document.createElement('div');ov.id='dynModalOverlay';ov.className='modal-overlay';ov.onclick=e=>{if(e.target===ov)closeDynModal();};document.body.appendChild(ov);}
  ov.innerHTML=html;ov.classList.add('open');
}
function closeDynModal(){const ov=$('dynModalOverlay');if(ov)ov.classList.remove('open');}
window.closeDynModal=closeDynModal;

// ─── STATE SERIALIZATION ─────────────────────────────────────────────────────
function collectState(){
  return {
    v:3, FX, fxUpdated,
    MEMBERS,
    BANKS,
    CREDIT_CARDS: CREDIT_CARDS.map(cc=>({...cc})),
    INVESTMENTS,
    ALACAK_VERECEK,
    avNextId,
    INCOME_RECORDS,
    incNextId,
    allTransactions,
    BUDGET_DATA,
    PLAN_INC_TRY:[...PLAN_INC_TRY],
    PLAN_EXP_TRY:[...PLAN_EXP_TRY],
    PLAN_INC_CATS:PLAN_INC_CATS.map(c=>({cat:c.cat,monthly:[...c.monthly]})),
    PLAN_EXP_CATS:PLAN_EXP_CATS.map(c=>({cat:c.cat,monthly:[...c.monthly]})),
    BANK_MOVEMENTS: window.BANK_MOVEMENTS||[],
    PAID_EKSTRES: [...PAID_EKSTRES],
    savedAt: new Date().toISOString(),
  };
}

function applyState(s){
  if(!s) return;
  if(s.FX){FX=s.FX;fxUpdated=s.fxUpdated||fxUpdated;const d=$('fxDisplay');if(d)d.textContent='₺'+FX;const r=$('f-rate');if(r)r.value=FX;}
  if(s.MEMBERS&&s.MEMBERS.length) MEMBERS.splice(0,MEMBERS.length,...s.MEMBERS);
  if(s.BANKS) BANKS.splice(0,BANKS.length,...s.BANKS);
  if(s.CREDIT_CARDS) CREDIT_CARDS.splice(0,CREDIT_CARDS.length,...s.CREDIT_CARDS);
  if(s.INVESTMENTS){INVESTMENTS.lastUpdated=s.INVESTMENTS.lastUpdated;INVESTMENTS.items=s.INVESTMENTS.items;}
  if(s.ALACAK_VERECEK) ALACAK_VERECEK.splice(0,ALACAK_VERECEK.length,...s.ALACAK_VERECEK);
  if(s.avNextId) avNextId=s.avNextId;
  if(s.INCOME_RECORDS) INCOME_RECORDS.splice(0,INCOME_RECORDS.length,...s.INCOME_RECORDS);
  if(s.incNextId) incNextId=s.incNextId;
  if(s.allTransactions) allTransactions.splice(0,allTransactions.length,...s.allTransactions);
  if(s.BUDGET_DATA) BUDGET_DATA.splice(0,BUDGET_DATA.length,...s.BUDGET_DATA);
  if(s.PLAN_INC_TRY) PLAN_INC_TRY.splice(0,12,...s.PLAN_INC_TRY);
  if(s.PLAN_EXP_TRY) PLAN_EXP_TRY.splice(0,12,...s.PLAN_EXP_TRY);
  if(s.PLAN_INC_CATS) PLAN_INC_CATS.forEach((c,i)=>{if(s.PLAN_INC_CATS[i])c.monthly=[...s.PLAN_INC_CATS[i].monthly];});
  if(s.PLAN_EXP_CATS) PLAN_EXP_CATS.forEach((c,i)=>{if(s.PLAN_EXP_CATS[i])c.monthly=[...s.PLAN_EXP_CATS[i].monthly];});
  if(s.BANK_MOVEMENTS) window.BANK_MOVEMENTS=s.BANK_MOVEMENTS;
  if(s.PAID_EKSTRES) PAID_EKSTRES=new Set(s.PAID_EKSTRES);
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
// Katman 1: GitHub Gist (cihazlar arası otomatik, ücretsiz)
// Katman 2: localStorage (aynı bilgisayar, çevrimdışı yedek)
// Katman 3: JSON dosya (manuel yedek)

const LS_KEY   = 'butce_data_v2';
const LS_CLOUD = 'butce_gist_cfg';
let saveTimer  = null;
let _gistCfg   = null;

function getGistCfg(){
  if(_gistCfg) return _gistCfg;
  try{ _gistCfg=JSON.parse(localStorage.getItem(LS_CLOUD)||'null'); }catch(e){}
  return _gistCfg;
}
function setGistCfg(cfg){ _gistCfg=cfg; localStorage.setItem(LS_CLOUD,JSON.stringify(cfg)); }

function showSaveStatus(msg,color='var(--green)'){
  const el=$('saveIndicator');
  if(el) el.innerHTML=`<span style="color:${color}">${msg}</span>`;
}
function updateCloudBtn(){
  const lbl=$('cloudBtnLabel');
  if(!lbl) return;
  const cfg=getGistCfg();
  lbl.textContent = cfg?.gistId ? '✓ GitHub' : 'GitHub Gist';
  lbl.parentElement.style.color = cfg?.gistId ? 'var(--green)' : 'var(--text3)';
  lbl.parentElement.style.borderColor = cfg?.gistId ? 'rgba(52,211,153,.4)' : '';
}

// ── GitHub Gist API ───────────────────────────────────────────────────────────
const GIST_FILENAME = 'butce-panel-data.json';
const GIST_API = 'https://api.github.com/gists';

async function gistSave(){
  const cfg=getGistCfg();
  if(!cfg?.token) return false;
  const content=JSON.stringify(collectState(),null,2);
  const headers={'Content-Type':'application/json','Authorization':`token ${cfg.token}`,'Accept':'application/vnd.github+json'};
  const body=JSON.stringify({description:'Bütçe Paneli Verisi',public:false,files:{[GIST_FILENAME]:{content}}});
  try{
    let res;
    if(cfg.gistId) res=await fetch(`${GIST_API}/${cfg.gistId}`,{method:'PATCH',headers,body});
    else           res=await fetch(GIST_API,{method:'POST',headers,body});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!cfg.gistId&&data.id){ setGistCfg({...cfg,gistId:data.id}); updateCloudBtn(); }
    const t=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    showSaveStatus(`✓ ${t} GitHub kaydedildi`,'var(--green)');
    return true;
  }catch(e){ console.warn('Gist kayıt:',e.message); showSaveStatus(`⚠ GitHub: ${e.message}`,'var(--red)'); return false; }
}

async function gistLoad(){
  const cfg=getGistCfg();
  if(!cfg?.token||!cfg?.gistId) return false;
  try{
    const res=await fetch(`${GIST_API}/${cfg.gistId}`,{headers:{'Authorization':`token ${cfg.token}`,'Accept':'application/vnd.github+json'}});
    if(res.status===401) throw new Error('401 — Token geçersiz veya süresi dolmuş');
    if(res.status===403) throw new Error('403 — Token Gist yetkisine sahip değil');
    if(res.status===404) throw new Error('404 — Gist ID bulunamadı');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const raw=data.files?.[GIST_FILENAME]?.content;
    if(!raw){
      // Gist var ama dosya adı farklı olabilir — mevcut dosyaları listele
      const fileList=Object.keys(data.files||{}).join(', ');
      throw new Error(`"${GIST_FILENAME}" bulunamadı. Gist'teki dosyalar: ${fileList||'(boş)'}`);
    }
    const s=JSON.parse(raw);
    applyState(s);
    if(s.savedAt){
      const d=new Date(s.savedAt);
      showSaveStatus(`✓ ${d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})} ${d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})} — GitHub`,'var(--green)');
    }
    return true;
  }catch(e){
    console.warn('Gist yükleme:', e.message);
    window._lastGistError=e.message;
    return false;
  }
}

// ── localStorage ──────────────────────────────────────────────────────────────
function localSave(){
  try{ localStorage.setItem(LS_KEY,JSON.stringify(collectState())); return true; }catch(e){ return false; }
}
function localLoad(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const s=JSON.parse(raw);
    applyState(s);
    if(s.savedAt){
      const d=new Date(s.savedAt);
      showSaveStatus(`💾 ${d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})} ${d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})} — yerel`,'var(--text3)');
    }
    return true;
  }catch(e){ return false; }
}

// ── Birleşik kayıt ────────────────────────────────────────────────────────────
async function saveAll(){
  localSave();
  const ok=await gistSave();
  if(!ok&&!getGistCfg()?.token){
    const t=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    showSaveStatus(`💾 ${t} kaydedildi`,'var(--green)');
  }
}

// Auto-save her sayfa değişiminde
const _origSwitch=switchPage;
window.switchPage=function(name,el){
  _origSwitch(name,el);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveAll,700);
};

// ── GitHub Gist Ayarları ──────────────────────────────────────────────────────
window.openCloudSettings=function(){
  const cfg=getGistCfg()||{};
  const html=`<div class="modal" style="width:540px" onclick="event.stopPropagation()">
    <div class="modal-title" style="color:var(--green)">GitHub Gist Senkronizasyonu</div>
    <div style="background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:14px 16px;margin-bottom:18px;line-height:1.9;font-size:12px">
      <strong style="color:var(--green)">Kurulum (3 adım, 3 dakika)</strong><br>
      <strong>1.</strong> <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent)">github.com/settings/tokens/new</a> adresine git<br>
      <strong>2.</strong> Note: "Bütçe" yaz · Expiration: "No expiration" · <strong>Gist</strong> kutusunu işaretle → Generate token<br>
      <strong>3.</strong> Oluşan token'ı (ghp_...) aşağıya yapıştır → Kaydet<br>
      <span style="color:var(--text3);font-size:11px">İlk kaydette Gist otomatik oluşur. Gist ID'yi diğer cihazlara da girersiniz.</span>
    </div>
    <div class="form-group">
      <label class="form-label">GitHub Personal Access Token</label>
      <input class="form-input" id="gh-token" type="password" value="${cfg.token||''}" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="font-family:var(--mono);font-size:12px">
      <div style="font-size:10px;color:var(--text3);margin-top:4px">Token sadece tarayıcınızda saklanır — yalnızca api.github.com'a gönderilir</div>
    </div>
    <div class="form-group">
      <label class="form-label">Gist ID <span style="font-weight:400;color:var(--text3)">(ilk kaydette otomatik oluşur)</span></label>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="gh-gistid" value="${cfg.gistId||''}" placeholder="a1b2c3d4e5f6..." style="font-family:var(--mono);font-size:12px;flex:1">
        ${cfg.gistId?`<button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText('${cfg.gistId}').then(()=>{this.textContent='✓';setTimeout(()=>this.textContent='Kopyala',1800)})">Kopyala</button>
        <a href="https://gist.github.com/${cfg.gistId}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none;white-space:nowrap">Görüntüle ↗</a>`:''}
      </div>
    </div>
    ${cfg.gistId?`<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--green);margin-bottom:4px">✓ Bağlantı aktif — kaydettiğinizde GitHub Gist'e otomatik yazılır</div>`:''}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDynModal()">İptal</button>
      ${cfg.gistId?`<button class="btn btn-ghost" onclick="syncFromGist()" style="color:var(--teal)">↓ Gist'ten Yükle</button>`:''}
      ${cfg.token?`<button class="btn btn-ghost" style="color:var(--red)" onclick="if(confirm('Bağlantıyı kes?')){setGistCfg(null);_gistCfg=null;updateCloudBtn();closeDynModal();}">Kes</button>`:''}
      <button class="btn btn-primary" onclick="saveGistSettings()">Kaydet</button>
    </div>
  </div>`;
  showDynModal(html);
};

window.saveGistSettings=function(){
  const token=$('gh-token').value.trim();
  const gistId=$('gh-gistid').value.trim();
  if(!token){alert('Token boş olamaz.');return;}
  setGistCfg({token,gistId:gistId||null});
  updateCloudBtn();
  closeDynModal();
  showSaveStatus(gistId?'GitHub Gist bağlantısı kuruldu ✓':'Token kaydedildi — ilk değişiklikte Gist oluşacak','var(--green)');
};

window.syncFromGist=async function(){
  closeDynModal();
  showSaveStatus('↓ GitHub\'tan yükleniyor…','var(--text3)');
  const ok=await gistLoad();
  if(ok){
    localSave();
    switchPage(currentPage,null);
    document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes(currentPage))n.classList.add('active');});
  } else {
    const err=window._lastGistError||'Bilinmeyen hata';
    showSaveStatus(`⚠ ${err}`,'var(--red)');
    alert(`GitHub Gist yükleme hatası:\n\n${err}\n\nGist ayarlarını kontrol edin.`);
  }
};

// ── JSON Dışa / İçe Aktar ─────────────────────────────────────────────────────
window.exportData=function(){
  const blob=new Blob([JSON.stringify(collectState(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`butce-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showSaveStatus('↓ JSON indirildi','var(--amber)');
};

window.importData=function(){$('importFileInput').value='';$('importFileInput').click();};

window.handleImportFile=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const s=JSON.parse(e.target.result);
      if(!s.BANKS&&!s.allTransactions) throw new Error('Geçersiz format');
      if(!confirm(`"${file.name}" yüklensin mi?`)) return;
      applyState(s);
      saveAll();
      switchPage(currentPage,null);
      document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes(currentPage))n.classList.add('active');});
      showSaveStatus(`✓ ${file.name} yüklendi`,'var(--green)');
    }catch(err){alert('Dosya okunamadı: '+err.message);}
  };
  reader.readAsText(file);
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
if(!window.BANK_MOVEMENTS) window.BANK_MOVEMENTS=[];

(async function init(){
  updateCloudBtn();
  showSaveStatus('⟳ yükleniyor…','var(--text3)');

  const cfg = getGistCfg();

  if(!cfg?.token || !cfg?.gistId){
    // No Gist config — try localStorage, then show setup banner
    const localOk = localLoad();
    if(!localOk) showSaveStatus('Veri yok — Gist bağlayın','var(--amber)');
    switchPage('ozet', document.querySelector('.nav-item.active'));
    // Show prominent setup banner after render
    setTimeout(showGistSetupBanner, 200);
    return;
  }

  // Gist config exists — try to load
  const gistOk = await gistLoad();
  if(!gistOk){
    // Gist failed — fall back to local
    const localOk = localLoad();
    showSaveStatus('⚠ GitHub bağlanamadı — yerel veri kullanılıyor','var(--amber)');
    switchPage('ozet', document.querySelector('.nav-item.active'));
    setTimeout(()=>showGistErrorBanner(), 200);
    return;
  }

  switchPage('ozet', document.querySelector('.nav-item.active'));
})();

function showGistSetupBanner(){
  const content = $('mainContent');
  if(!content) return;
  const banner = document.createElement('div');
  banner.id = 'gistBanner';
  banner.style.cssText = 'margin-bottom:16px;background:linear-gradient(135deg,rgba(79,142,247,.12),rgba(124,90,245,.08));border:1px solid rgba(79,142,247,.3);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:16px';
  banner.innerHTML = `
    <div style="width:40px;height:40px;border-radius:10px;background:rgba(79,142,247,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">☁</div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">GitHub Gist bağlantısı kurulmamış</div>
      <div style="font-size:12px;color:var(--text3);line-height:1.6">
        Verilerinizi cihazlar arasında senkronize etmek için GitHub Personal Access Token ve Gist ID gerekli.
        Daha önce veri girdiyseniz, eski token + Gist ID ile bağlanıp <strong style="color:var(--text)">Gist'ten Yükle</strong> diyerek verinizi geri getirebilirsiniz.
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="openCloudSettings()" class="btn btn-primary" style="white-space:nowrap">☁ Gist Bağla</button>
      <button onclick="this.closest('#gistBanner').remove()" class="btn btn-ghost" style="padding:7px 10px;font-size:16px;line-height:1">✕</button>

function showGistErrorBanner(){
  const content = $('mainContent');
  if(!content) return;
  const banner = document.createElement('div');
  banner.id = 'gistErrBanner';
  banner.style.cssText = 'margin-bottom:16px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px';
  banner.innerHTML = `
    <span style="font-size:18px">⚠</span>
    <div style="flex:1;font-size:12px;color:var(--text2)">
      GitHub Gist'e bağlanılamadı — yerel veriler gösteriliyor. Token süresi dolmuş veya internet bağlantısı yok olabilir.
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="syncFromGist()" class="btn btn-ghost btn-sm" style="color:var(--teal)">Tekrar Dene</button>
      <button onclick="openCloudSettings()" class="btn btn-ghost btn-sm">Ayarlar</button>
      <button onclick="this.closest('#gistErrBanner').remove()" class="btn btn-ghost btn-sm" style="padding:5px 8px">✕</button>
    </div>`;
  content.insertBefore(banner, content.firstChild);
}
